      - name: review_comment_id
        value: '{{ string($["Create PR comment"].data.id) }}'
    id: upsert-pr-comment-memory
    name: Remember PR comment
    position:
      x: 3840
      "y": 288
    type: TYPE_ACTION
  - component: upsertMemory
    configuration:
      matchList:
      - name: repository
        value: '{{ $["Format PR review"].data.result.repository }}'
      - name: pr_number
        value: '{{ $["Format PR review"].data.result.pr_number }}'
      namespace: prRiskChecks
      valueList:
      - name: repository
        value: '{{ $["Format PR review"].data.result.repository }}'
      - name: pr_number
        value: '{{ $["Format PR review"].data.result.pr_number }}'
      - name: title
