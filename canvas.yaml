      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 0 ? $["Format
        PR review"].data.result.reviewers_to_request[0] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 1 ? $["Format
        PR review"].data.result.reviewers_to_request[1] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 2 ? $["Format
        PR review"].data.result.reviewers_to_request[2] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 3 ? $["Format
        PR review"].data.result.reviewers_to_request[3] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 4 ? $["Format
        PR review"].data.result.reviewers_to_request[4] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 5 ? $["Format
        PR review"].data.result.reviewers_to_request[5] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 6 ? $["Format
        PR review"].data.result.reviewers_to_request[6] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 7 ? $["Format
        PR review"].data.result.reviewers_to_request[7] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 8 ? $["Format
        PR review"].data.result.reviewers_to_request[8] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 9 ? $["Format
        PR review"].data.result.reviewers_to_request[9] : "" }}'
    id: add-pull-request-reviewers
    integration:
      id: 879eee5b-a973-4822-b4f2-0dc1df8b9680
    name: Add pull request reviewers
    position:
      x: 3312
      "y": 720
    type: TYPE_ACTION
  - component: annotation
    configuration:
      color: yellow
      height: 120
      text: If the risk is high, request review
      width: 304
    id: annotation-note-2-9dv0lv
    name: Note 2
    position:
      x: 2664
      "y": 552
    type: TYPE_WIDGET
  - component: upsertMemory
    configuration:
      matchList:
      - name: repository
        value: '{{ $["Format PR review"].data.result.repository }}'
      - name: pr_number
        value: '{{ $["Format PR review"].data.result.pr_number }}'
      namespace: prRiskChecks
      valueList:
      - name: repository
