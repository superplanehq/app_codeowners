---
apiVersion: v1
kind: Canvas
metadata:
  description: Enforce codeowners.yml approval on pull requests with self-approval
    support.
  name: app-codeowners
spec:
  edges:
  - channel: default
    sourceId: trigger-on-pull-request
    targetId: if-should-check-pr
  - channel: 'true'
    sourceId: if-should-check-pr
    targetId: check-codeowners
  - channel: default
    sourceId: trigger-on-pr-review
    targetId: if-should-check-review
  - channel: 'true'
    sourceId: if-should-check-review
    targetId: check-codeowners
  - channel: passed
    sourceId: check-codeowners
    targetId: if-should-request-reviewers
  - channel: 'true'
    sourceId: if-should-request-reviewers
    targetId: add-pull-request-reviewers
  - channel: 'false'
    sourceId: if-should-request-reviewers
    targetId: record-check
  - channel: default
    sourceId: add-pull-request-reviewers
    targetId: record-check
  - channel: default
    sourceId: record-check
    targetId: if-satisfied
  - channel: 'true'
    sourceId: if-satisfied
    targetId: publish-success-status
  - channel: 'false'
    sourceId: if-satisfied
    targetId: publish-failure-status
  nodes:
  - component: if
    configuration:
      expression: '{{ root().data.action == "opened" && len($["Check code owners"].data.result.reviewers_to_request)
        > 0 }}'
    id: if-should-request-reviewers
    name: Should request reviewers?
    position:
      x: 1720
      "y": 380
    type: TYPE_ACTION
  - component: github.addPullRequestReviewers
    configuration:
      pullNumber: '{{ root().data.pull_request.number }}'
      repository: '{{ root().data.repository.name }}'
      reviewers:
      - '{{ len($["Check code owners"].data.result.reviewers_to_request) > 0 ? $["Check
        code owners"].data.result.reviewers_to_request[0] : "" }}'
      - '{{ len($["Check code owners"].data.result.reviewers_to_request) > 1 ? $["Check
        code owners"].data.result.reviewers_to_request[1] : "" }}'
      - '{{ len($["Check code owners"].data.result.reviewers_to_request) > 2 ? $["Check
        code owners"].data.result.reviewers_to_request[2] : "" }}'
      - '{{ len($["Check code owners"].data.result.reviewers_to_request) > 3 ? $["Check
        code owners"].data.result.reviewers_to_request[3] : "" }}'
      - '{{ len($["Check code owners"].data.result.reviewers_to_request) > 4 ? $["Check
        code owners"].data.result.reviewers_to_request[4] : "" }}'
      - '{{ len($["Check code owners"].data.result.reviewers_to_request) > 5 ? $["Check
        code owners"].data.result.reviewers_to_request[5] : "" }}'
    errorMessage: integration is required
    id: add-pull-request-reviewers
    name: Add pull request reviewers
    position:
      x: 1880
      "y": 380
    type: TYPE_ACTION
  - component: if
    configuration:
      expression: '{{ $["Check code owners"].data.result.valid == true }}'
    id: if-satisfied
    name: Satisfied?
    position:
      x: 2680
      "y": 380
    type: TYPE_ACTION
  - component: github.onPullRequest
    configuration:
      actions:
      - opened
      - synchronize
      - reopened
      repository: ''
    errorMessage: integration is required
    id: trigger-on-pull-request
    name: On Pull Request
    position:
      x: 120
      "y": 200
    type: TYPE_TRIGGER
  - component: if
    configuration:
      expression: '{{ root().data.action == "opened" || root().data.action == "synchronize"
        || root().data.action == "reopened" }}'
    id: if-should-check-pr
    name: Should check PR?
    position:
      x: 760
      "y": 200
    type: TYPE_ACTION
  - component: if
    configuration:
      expression: '{{ root().data.action == "submitted" }}'
    id: if-should-check-review
    name: Should check review?
    position:
      x: 760
      "y": 560
    type: TYPE_ACTION
  - component: upsertMemory
    configuration:
      matchList:
      - name: repository
        value: "{{ root().data.repository.full_name }}"
      - name: pr_number
        value: "{{ root().data.pull_request.number }}"
      namespace: codeownersChecks
      valueList:
      - name: repository
        value: "{{ root().data.repository.full_name }}"
      - name: pr_number
        value: "{{ root().data.pull_request.number }}"
      - name: title
        value: "{{ root().data.pull_request.title }}"
      - name: author
        value: "{{ root().data.pull_request.user.login }}"
      - name: satisfied
        value: '{{ $["Check code owners"].data.result.satisfied == true ? "true" :
          "false" }}'
      - name: changed_files
        value: '{{ $["Check code owners"].data.result.changed_files }}'
      - name: covered_files
        value: '{{ $["Check code owners"].data.result.covered_files }}'
      - name: pending_files
        value: '{{ $["Check code owners"].data.result.pending_files }}'
      - name: pending_owners
        value: '{{ $["Check code owners"].data.result.pending_owners }}'
      - name: approvers
        value: '{{ $["Check code owners"].data.result.approvers }}'
      - name: last_checked_at
        value: "{{ int(now().Unix()) }}"
    id: record-check
    name: Record check
    position:
      x: 2040
      "y": 380
    type: TYPE_ACTION
  - component: github.publishCommitStatus
    configuration:
      context: Code Owners
      description: '{{ $["Check code owners"].data.result.reason }}'
      repository: "{{ root().data.repository.name }}"
      sha: "{{ root().data.pull_request.head.sha }}"
      state: success
    errorMessage: integration is required
    id: publish-success-status
    name: Publish success status
    position:
      x: 3320
      "y": 560
    type: TYPE_ACTION
  - component: github.publishCommitStatus
    configuration:
      context: Code Owners
      description: '{{ $["Check code owners"].data.result.reason }}'
      repository: "{{ root().data.repository.name }}"
      sha: "{{ root().data.pull_request.head.sha }}"
      state: failure
    errorMessage: integration is required
    id: publish-failure-status
    name: Publish failure status
    position:
      x: 3320
      "y": 200
    type: TYPE_ACTION
  - component: github.onPRReviewComment
    configuration:
      repository: ''
    errorMessage: integration is required
    id: trigger-on-pr-review
    name: On PR Review
    position:
      x: 120
      "y": 560
    type: TYPE_TRIGGER
  - component: runnerJS
    configuration:
      enable_setup_commands: true
      execution_mode: host
      execution_timeout_seconds: 300
      machine_type: e1-tiny-arm64
      script: |
        const yaml = require("js-yaml");

        const CODEOWNERS_CONFIG_PATH = "codeowners.yml";
        const MAIN_BRANCHES = ["main", "master"];

        function isMainBranch(ref) {
          return MAIN_BRANCHES.indexOf(String(ref || "").toLowerCase()) !== -1;
        }

        function decodeContent(content) {
          if (!content) return "";
          if (typeof Buffer !== "undefined") {
            return Buffer.from(content, "base64").toString("utf8");
          }
          return atob(content.replace(/\n/g, ""));
        }

        function escapeRegex(value) {
          return value.replace(/[.+^${}()|[\]\\]/g, "\\$&");
        }

        function patternToRegex(pattern) {
          let source = pattern.trim();
          if (!source) return null;

          if (source.startsWith("/")) source = source.slice(1);

          let regex = "";
          for (let i = 0; i < source.length; i += 1) {
            const ch = source[i];
            if (ch === "*" && source[i + 1] === "*") {
              if (source[i + 2] === "/") {
                regex += "(?:.+/)?";
                i += 2;
              } else {
                regex += ".*";
                i += 1;
              }
            } else if (ch === "*") {
              regex += "[^/]*";
            } else if (ch === "?") {
              regex += "[^/]";
            } else {
              regex += escapeRegex(ch);
            }
          }

          return new RegExp("^" + regex + "(?:/.*)?$");
        }

        function matchPattern(pattern, filePath) {
          const regex = patternToRegex(pattern);
          if (!regex) return false;
          const normalized = String(filePath || "").replace(/^\/+/, "");
          return regex.test(normalized);
        }

        function parseGroups(doc) {
          const groups = {};
          const raw = doc.groups || {};

          for (const name of Object.keys(raw)) {
            const value = raw[name];
            let members = [];
            if (Array.isArray(value)) {
              members = value;
            } else if (value && Array.isArray(value.members)) {
              members = value.members;
            }

            const key = String(name).toLowerCase();
            groups[key] = members
              .map(function (member) {
                return String(member).trim().replace(/^@/, "").toLowerCase();
              })
              .filter(Boolean);
          }

          return groups;
        }

        function parseCodeownersYaml(text) {
          const doc = yaml.load(String(text || "")) || {};
          const groups = parseGroups(doc);
          const rules = [];

          for (const rule of doc.rules || []) {
            const patterns = [];
            if (rule.pattern) patterns.push(String(rule.pattern));
            if (Array.isArray(rule.patterns)) {
              patterns.push.apply(
                patterns,
                rule.patterns.map(function (value) {
                  return String(value);
                }),
              );
            }
            if (Array.isArray(rule.paths)) {
              patterns.push.apply(
                patterns,
                rule.paths.map(function (value) {
                  return String(value);
                }),
              );
            }

            const owners = (rule.owners || [])
              .map(function (value) {
                return String(value).trim();
              })
              .filter(function (value) {
                return value.indexOf("@") === 0;
              });
            const selfApproval =
              rule.self_approval === true ||
              String(rule.self_approval || "").toLowerCase() === "true";

            for (const pattern of patterns) {
              if (pattern && owners.length) {
                rules.push({
                  pattern: pattern,
                  owners: owners,
                  self_approval: selfApproval,
                });
              }
            }
          }

          return {
            rules: rules,
            groups: groups,
          };
        }

        function matchingRuleForFile(path, rules) {
          let match = null;
          for (const rule of rules) {
            if (matchPattern(rule.pattern, path)) {
              match = rule;
            }
          }
          return match;
        }

        function ownerLogins(owner, groups) {
          const value = String(owner || "").trim();
          if (!value || value[0] !== "@") return [];

          const ref = String(value.slice(1)).toLowerCase();
          if (groups[ref]) return groups[ref];
          return [ref];
        }

        function ownerMatches(login, owners, groups) {
          const normalized = String(login || "").toLowerCase();
          if (!normalized) return false;

          for (const owner of owners) {
            const logins = ownerLogins(owner, groups);
            if (logins.indexOf(normalized) !== -1) return true;
          }
          return false;
        }

        function collectReviewersToRequest(changedPaths, rules, groups, author, approvers) {
          const authorNorm = String(author || "").toLowerCase();
          const approved = {};
          for (const login of approvers || []) {
            approved[String(login).toLowerCase()] = true;
          }

          const reviewers = [];
          const seen = {};
          for (const path of changedPaths) {
            const matched = matchingRuleForFile(path, rules);
            if (!matched || !matched.owners.length) continue;

            for (const owner of matched.owners) {
              for (const login of ownerLogins(owner, groups)) {
                if (!login || login === authorNorm || approved[login] || seen[login]) {
                  continue;
                }
                seen[login] = true;
                reviewers.push(login);
              }
            }
          }

          return reviewers;
        }

        async function githubFetch(url) {
          const headers = {
            Accept: "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
          };
          if (process.env.GITHUB_TOKEN) {
            headers.Authorization = "Bearer " + process.env.GITHUB_TOKEN;
          }

          const response = await fetch(url, { headers: headers });
          if (!response.ok) {
            throw new Error(
              "GitHub API error " + response.status + ": " + (await response.text()),
            );
          }
          return response.json();
        }

        async function githubFetchAll(url) {
          const items = [];
          let nextUrl = url;
          while (nextUrl) {
            const headers = {
              Accept: "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
            };
            if (process.env.GITHUB_TOKEN) {
              headers.Authorization = "Bearer " + process.env.GITHUB_TOKEN;
            }

            const response = await fetch(nextUrl, { headers: headers });
            if (!response.ok) {
              throw new Error(
                "GitHub API error " + response.status + ": " + (await response.text()),
              );
            }

            const page = await response.json();
            if (Array.isArray(page)) {
              items.push.apply(items, page);
            }

            const link = response.headers.get("link") || "";
            const match = link.match(/<([^>]+)>;\s*rel="next"/);
            nextUrl = match ? match[1] : null;
          }
          return items;
        }

        async function fetchCodeownersConfig(repo, targetBranch) {
          const branches = [];
          const target = String(targetBranch || "").toLowerCase();
          if (target === "main") {
            branches.push("main", "master");
          } else if (target === "master") {
            branches.push("master", "main");
          } else {
            branches.push("main", "master");
          }

          const seen = {};
          for (const branch of branches) {
            if (seen[branch]) continue;
            seen[branch] = true;
            try {
              const content = await githubFetch(
                "https://api.github.com/repos/" +
                  repo +
                  "/contents/" +
                  encodeURIComponent(CODEOWNERS_CONFIG_PATH) +
                  "?ref=" +
                  encodeURIComponent(branch),
              );
              if (content && content.content) {
                return {
                  path: CODEOWNERS_CONFIG_PATH,
                  text: decodeContent(content.content),
                  policy_branch: branch,
                };
              }
            } catch (error) {
              // try the other main branch
            }
          }
          return null;
        }

        function latestApprovals(reviews) {
          const byUser = {};
          for (const review of reviews || []) {
            const login = review && review.user && review.user.login;
            if (!login) continue;
            const submitted = new Date(review.submitted_at || 0).getTime();
            const existing = byUser[login];
            if (!existing || submitted >= existing.submitted) {
              byUser[login] = {
                login: login,
                state: review.state,
                submitted: submitted,
              };
            }
          }

          return Object.keys(byUser)
            .map(function (login) {
              return byUser[login];
            })
            .filter(function (entry) {
              return entry.state === "APPROVED";
            })
            .map(function (entry) {
              return entry.login;
            });
        }

        function resolveEvent() {
          const prTrigger = ($["On Pull Request"] && $["On Pull Request"].data) || null;
          const reviewTrigger = ($["On PR Review"] && $["On PR Review"].data) || null;
          return prTrigger || reviewTrigger || {};
        }

        async function main() {
          const event = resolveEvent();
          const pr = event.pull_request || {};
          const repository = event.repository || {};
          const repo = repository.full_name || "";
          const prNumber = pr.number;
          const action = event.action || "";

          if (!repo || !prNumber) {
            throw new Error("Missing repository or pull request number in trigger payload.");
          }

          const files = await githubFetchAll(
            "https://api.github.com/repos/" +
              repo +
              "/pulls/" +
              prNumber +
              "/files?per_page=100",
          );
          const changedPaths = files
            .map(function (file) {
              return file && file.filename;
            })
            .filter(Boolean);

          const baseBranch = String((pr.base && pr.base.ref) || "");
          const author = String((pr.user && pr.user.login) || "");

          if (!isMainBranch(baseBranch)) {
            return {
              valid: true,
              satisfied: true,
              skipped: true,
              repository: repo,
              pr_number: String(prNumber),
              title: String(pr.title || ""),
              author: author,
              head_sha: String((pr.head && pr.head.sha) || ""),
              base_branch: baseBranch,
              policy_branch: "",
              codeowners_path: "",
              changed_files: changedPaths.length,
              covered_files: 0,
              pending_files: 0,
              pending_owners: "",
              approvers: "",
              reviewers_to_request: [],
              reason:
                "Code owners policy only applies to pull requests targeting main or master.",
              file_results: [],
              pending: [],
            };
          }

          const codeowners = await fetchCodeownersConfig(repo, baseBranch);
          const parsed = codeowners
            ? parseCodeownersYaml(codeowners.text)
            : { rules: [], groups: {} };
          const rules = parsed.rules;
          const groups = parsed.groups;

          const reviews = await githubFetchAll(
            "https://api.github.com/repos/" +
              repo +
              "/pulls/" +
              prNumber +
              "/reviews?per_page=100",
          );
          const approvers = latestApprovals(reviews);
          const reviewersToRequest = collectReviewersToRequest(
            changedPaths,
            rules,
            groups,
            author,
            approvers,
          );

          const fileResults = [];
          for (const path of changedPaths) {
            const matched = matchingRuleForFile(path, rules);
            if (!matched || !matched.owners.length) {
              fileResults.push({
                path: path,
                owners: [],
                self_approval: false,
                approved_by: [],
                satisfied: true,
              });
              continue;
            }

            const owners = matched.owners;
            const selfApproval = matched.self_approval === true;

            const approvedBy = [];
            for (const login of approvers) {
              if (ownerMatches(login, owners, groups)) {
                approvedBy.push(login);
              }
            }

            let satisfied = approvedBy.length > 0;
            let autoApproved = false;
            if (!satisfied && selfApproval && author) {
              if (ownerMatches(author, owners, groups)) {
                satisfied = true;
                autoApproved = true;
                approvedBy.push(author);
              }
            }

            fileResults.push({
              path: path,
              owners: owners,
              self_approval: selfApproval,
              approved_by: approvedBy,
              auto_approved: autoApproved,
              satisfied: satisfied,
            });
          }

          const coveredFiles = fileResults.filter(function (entry) {
            return entry.owners.length > 0;
          });
          const pendingFiles = fileResults.filter(function (entry) {
            return entry.owners.length > 0 && !entry.satisfied;
          });
          const valid = pendingFiles.length === 0;

          const pendingOwners = [];
          const seenOwners = {};
          for (const entry of pendingFiles) {
            for (const owner of entry.owners) {
              if (!seenOwners[owner]) {
                seenOwners[owner] = true;
                pendingOwners.push(owner);
              }
            }
          }

          let reason = "All code owner requirements are satisfied.";
          if (!codeowners) {
            reason = "No codeowners.yml file found on main or master; nothing to enforce.";
          } else if (!valid) {
            reason =
              "Waiting for approval from code owners for " +
              pendingFiles.length +
              " file(s).";
          } else if (
            fileResults.some(function (entry) {
              return entry.auto_approved;
            })
          ) {
            reason = "All code owner requirements are satisfied (self-approval).";
          }

          return {
            valid: valid,
            satisfied: valid,
            repository: repo,
            pr_number: String(prNumber),
            title: String(pr.title || ""),
            author: author,
            head_sha: String((pr.head && pr.head.sha) || ""),
            base_branch: baseBranch,
            policy_branch: codeowners ? codeowners.policy_branch : "",
            codeowners_path: codeowners ? codeowners.path : "",
            changed_files: changedPaths.length,
            covered_files: coveredFiles.length,
            pending_files: pendingFiles.length,
            pending_owners: pendingOwners.join(", "),
            approvers: approvers.join(", "),
            reviewers_to_request: reviewersToRequest,
            reason: reason,
            file_results: fileResults,
            pending: pendingFiles,
          };
        }
      setup_commands: 'npm install --no-save js-yaml

'
    id: check-codeowners
    name: Check code owners
    position:
      x: 1400
      "y": 380
    type: TYPE_ACTION
