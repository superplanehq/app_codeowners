    id: discord-notify-review
    integration:
      id: 8687b0b7-6482-43fe-b1cd-67b679985928
    metadata:
      channel:
        id: '1518301668758782022'
        name: "\U0001F440︱gh-pull-request-stream"
      hasEmbed: false
    name: Discord review posted
    position:
