      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 4 ? $["Format
        PR review"].data.result.reviewers_to_request[4] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 5 ? $["Format
        PR review"].data.result.reviewers_to_request[5] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 6 ? $["Format
        PR review"].data.result.reviewers_to_request[6] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 7 ? $["Format
        PR review"].data.result.reviewers_to_request[7] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 8 ? $["Format
        PR review"].data.result.reviewers_to_request[8] : "" }}'
      - '{{ len($["Format PR review"].data.result.reviewers_to_request) > 9 ? $["Format
