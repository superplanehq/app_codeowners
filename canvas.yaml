    id: upsertmemory-record-check-c410f8
    name: Record check
    position:
      x: 2664
      "y": 1272
    type: TYPE_ACTION
  - component: start
    configuration:
      templates:
      - name: run
        parameters:
        - name: repository
          placeholder: e.g. superplanehq/superplane
          title: Repository
          type: string
        - name: pull_number
          placeholder: e.g. 1234
          title: Pull request number
          type: string
        payload:
          action: manual
          pull_number: "{{ parameters.pull_number }}"
          repository: "{{ parameters.repository }}"
    id: trigger-check-pr
    name: Check PR
    position:
      x: 432
      "y": 936
    type: TYPE_TRIGGER
  - component: claude.runAgent
    configuration:
      agent: agent_011CaT3cYGGfqE6D9f3n8RBH
      environmentId: env_01495wraNQwjBV7seWopK4sz
      prompt: |
        Review this GitHub pull request.

        Repository: {{ root().data.action == "manual" ? root().data.repository : root().data.repository.full_name }}
        Pull request: #{{ root().data.action == "manual" ? string(root().data.pull_number) : string(root().data.pull_request.number) }}
        Title: {{ root().data.action == "manual" ? "" : root().data.pull_request.title }}
        Author: {{ root().data.action == "manual" ? "" : root().data.pull_request.user.login }}
        Base branch: {{ root().data.action == "manual" ? "main" : root().data.pull_request.base.ref }}
        Head SHA: {{ root().data.action == "manual" ? "" : root().data.pull_request.head.sha }}
        URL: https://github.com/{{ root().data.action == "manual" ? root().data.repository : root().data.repository.full_name }}/pull/{{ root().data.action == "manual" ? string(root().data.pull_number) : string(root().data.pull_request.number) }}

        Clone the repository, check out the PR head commit, review the full diff, and respond with ONLY valid JSON (no markdown fences).

        JSON schema:
        {
          "repository": "owner/repo",
          "pr_number": "123",
          "title": "PR title",
          "author": "github-username",
          "risk_score": 0,
          "risk_level": "low",
          "approved": true,
          "summary": "one sentence",
          "concerns": ["..."],
          "recommended_reviewers": ["github-username"]
        }

        Set approved=false for critical bugs, security issues, or risky changes without adequate tests.
        risk_score is 0-100 (higher = riskier). risk_level is low, medium, or high.
      secrets:
      - allowedHosts:
        - github.com
        - api.github.com
        envName: GITHUB_TOKEN
        value:
          key: GITHUB_TOKEN
          secret: app-codeowners
    id: review-pr
    integration:
      id: e9b91f54-ec81-404e-ac5a-1990d7dfba33
    name: Assess PR Risk
    position:
      x: 1512
      "y": 816
    type: TYPE_ACTION
