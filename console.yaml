---
apiVersion: v1
kind: Console
metadata:
  canvasId: 48ed089a-5d5c-4ca2-b360-81a437a3be4c
  name: pr-risk-review
spec:
  layout:
  - h: 4
    i: check-pr
    minH: 2
    minW: 2
    w: 4
    x: 0
    "y": 11
  - h: 11
    i: readme
    minH: 2
    minW: 2
    w: 4
    x: 0
    "y": 0
  - h: 15
    i: checks-table
    minH: 4
    minW: 4
    w: 8
    x: 4
    "y": 0
  panels:
  - content:
      node: trigger-check-pr
      showRun: true
      title: Check pull request
      triggerName: run
    id: check-pr
    type: node
  - content:
      body: |
        **PR Risk Review** checks out each pull request on a large runner (Node.js), runs an **LLM risk review** (Claude, OpenAI Codex, or Amazon Bedrock), and optionally combines that with **`codeowners.yml`** owner approvals.

        <details>
        <summary>Quick start</summary>

        1. Connect GitHub and bind the integration on the trigger and status nodes.
        2. Connect **Discord** on **Discord review posted** and select a channel.
        3. On **Review PR**, set **`LLM_PROVIDER`** to `anthropic`, `codex`, or `bedrock` and add the matching secret (`ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, or AWS/Bedrock access).
        4. Add **`GITHUB_TOKEN`** on **Review PR** and **Evaluate PR risk** for private repos.
        5. Optional: add `codeowners.yml` to your repository for owner approval rules.
        6. Use **Check pull request** below to run a check manually for any PR.

        </details>

        <details>
        <summary>Manual check</summary>

        Use the **Check pull request** panel to score risk and request reviewers for any PR.

        Enter `owner/repo` and the pull request number, then click **Run**.

        You can also re-check a PR from the **Recent checks** table using the row action.

        Manual checks work even when `codeowners.yml` is missing.

        </details>

        <details>
        <summary>LLM providers</summary>

        Set **`LLM_PROVIDER`** on **Review PR**:

        | Provider | Value | Secret / config |
        |---|---|---|
        | Claude (Anthropic API) | `anthropic` | `ANTHROPIC_API_KEY` |
        | OpenAI Codex | `codex` | `OPENAI_API_KEY` |
        | Amazon Bedrock | `bedrock` | `AWS_REGION` + Bedrock model access. Secrets: `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY` (optional if runner has IAM role), `AWS_SESSION_TOKEN` (optional) |

        Default models: `claude-opus-4-6`, `gpt-5.3-codex`, `anthropic.claude-opus-4-6-v1`.

        </details>

        <details>
        <summary>LLM + codeowners decision</summary>

        A check **passes** only when:

        1. The **LLM** returns approval after reviewing the checked-out diff
        2. **`codeowners.yml` owner rules** are satisfied (when rules exist) — each covered file has an approving owner on GitHub

        Risk score and level come from the LLM. Reviewers are requested from its recommendations plus `compliance_reviewers` in `codeowners.yml`.

        </details>

        <details>
        <summary>Checkout and LLM review</summary>

        When a pull request is **opened** or re-checked:

        1. **Review PR** clones the repo, checks out the PR head, and calls the configured LLM with the diff
        2. **Evaluate PR risk** merges the LLM decision with GitHub owner approvals, updates one PR comment (no duplicate comments on re-check), and on the **first** review posts to **Discord**

        </details>

        <details>
        <summary>Discord notification</summary>

        Posted only on the **first** review (not on re-check). Format:

        `[PR title](https://github.com/owner/repo/pull/123) - author - Risk: 9/100`

        </details>

        <details>
        <summary>codeowners.yml format</summary>

        ```yaml
        compliance_reviewers:
          - security-lead
          - compliance-officer

        groups:
          frontend-team:
            role: frontend
            members:
              - alice
              - bob
          docs-team:
            - carol

        rules:
          - pattern: "/src/**"
            self_approval: true
            owners:
              - "@frontend-team"
              - "@eve"
          - pattern: "/docs/**"
            self_approval: false
            owners:
              - "@docs-team"
        ```

        Patterns are matched from the **repository root**. Use a leading `/` for clarity — `/pkg/models/**` means the `pkg/models/` directory at the top level of the repo, not a `models` folder somewhere else.

        The last matching rule wins. `self_approval` defaults to `false`.

        </details>

        <details>
        <summary>Groups</summary>

        Define groups under `groups` with GitHub usernames (with or without `@`).

        Reference a group in `owners` as `@group-name`. Any listed member can satisfy the rule. If the name is not a group, it is treated as an individual GitHub user.

        </details>

        <details>
        <summary>Which branch?</summary>

        - `codeowners.yml` is read from `main` or `master`
        - Checks run only on pull requests into `main` or `master`
        - Pull requests into other branches are skipped

        </details>

        <details>
        <summary>Self-approval per rule</summary>

        Set `self_approval: true` when owners should be able to merge their own changes without leaving a review.

        Set `self_approval: false` (or omit it) to require an explicit approving review from a listed owner or group member.

        </details>

        <details>
        <summary>What gets checked</summary>

        A check runs when a pull request is opened, updated, reopened, or receives a submitted review.

        The app reads `codeowners.yml`, maps changed files to owners and groups, and verifies each covered file is approved. With `self_approval: true`, listed owners pass automatically on their own pull requests.

        - **Pass:** **PR Risk Review** status → success
        - **Fail:** **PR Risk Review** status → failure

        New commits trigger a fresh check. Approvals are re-evaluated when reviews are submitted.

        </details>
      title: PR Risk Review
    id: readme
    type: markdown
  - content:
      dataSource:
        kind: memory
        namespace: codeownersChecks
      render:
        columns:
        - field: pr_number
          label: PR
        - field: title
          format: link
          href: https://github.com/{repository}/pull/{pr_number}
          label: Title
        - field: author
          label: Author
        - field: '{{ string(int(risk_score)) + "/100" }}'
          label: Risk
        - field: satisfied
          format: badge
          label: Status
        - field: '{{ int(covered_files) == 0 ? "0/0" : string(int(covered_files) -
            int(pending_files)) + "/" + string(int(covered_files)) }}'
          label: Owner reviews
        - field: last_checked_at
          format: relative
          label: Last check
        kind: table
        rowActions:
        - icon: refresh
          kind: trigger
          label: Re-check
          node: trigger-check-pr
          payload:
            action: manual
            pull_number: "{{ pr_number }}"
            repository: "{{ repository }}"
          variant: default
        rowStyles:
        - field: satisfied
          op: eq
          tone: green
          value: 'true'
        - field: satisfied
          op: eq
          tone: red
          value: 'false'
        sort:
          field: last_checked_at
          order: desc
      title: Recent checks
    id: checks-table
    type: table
